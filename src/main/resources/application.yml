server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://localhost:6666/auth_server?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true
    username: root
    password: '111111'
    driver-class-name: com.mysql.cj.jdbc.Driver
  thymeleaf:
    cache: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.jackson2.SecurityJackson2Modules: WARN
