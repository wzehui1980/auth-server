<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证中心 - 登录成功</title>
    <!-- 预连接提升加载速度 -->
    <link rel="preconnect" href="https://cdn.staticfile.org">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <!-- 使用国内镜像 CDN 提升加载速度 -->
    <link href="https://cdn.staticfile.org/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f1f5f9;
        }
        body {
            /* 使用系统字体，避免加载 Google Fonts 变慢 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px; /* 增加 PC 端视觉宽度 */
            width: 100%;
        }
        .main-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: row; /* 强制 PC 端横向布局 */
            min-height: 550px;
        }
        .card-sidebar {
            flex: 0 0 400px; /* 固定左侧宽度 */
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-content {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .welcome-badge {
            display: inline-flex;
            align-items: center;
            background: #eef2ff;
            color: #4f46e5;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 24px;
            width: fit-content;
        }
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 按钮并排显示 */
            gap: 20px;
            margin-top: 30px;
        }
        .action-btn {
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1.5px solid #e2e8f0;
            color: #475569;
            background: white;
        }
        .action-btn i {
            font-size: 1.5rem;
        }
        .action-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: #f8fafc;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1);
        }
        .btn-admin {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            grid-column: span 2; /* 管理员按钮占满整行 */
            flex-direction: row;
            font-size: 1.1rem;
        }
        .btn-admin:hover {
            background-color: var(--primary-hover);
            color: white;
        }
        .feature-item {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .logout-link {
            color: #ef4444;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logout-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* 移动端适配 */
        @media (max-width: 992px) {
            .main-card {
                flex-direction: column;
            }
            .card-sidebar {
                flex: 0 0 auto;
                padding: 40px;
            }
            .action-grid {
                grid-template-columns: 1fr;
            }
            .btn-admin {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card shadow">
            <!-- 左侧装饰栏 (PC端占400px) -->
            <div class="card-sidebar">
                <div>
                    <div class="mb-4">
                        <i class="fas fa-shield-halved fa-3x"></i>
                    </div>
                    <h2 class="fw-bold mb-5">SSO 认证中心</h2>
                    
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                        <div>
                            <h6 class="mb-1 fw-bold">极致性能</h6>
                            <p class="small opacity-75 mb-0">基于 Spring Boot 3 响应式架构，提供毫秒级认证响应。</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-fingerprint"></i></div>
                        <div>
                            <h6 class="mb-1 fw-bold">多重认证</h6>
                            <p class="small opacity-75 mb-0">符合 OIDC 1.0 标准，支持多种身份识别与准入策略。</p>
                        </div>
                    </div>
                </div>
                
                <div class="pt-4 border-top border-white border-opacity-25">
                    <p class="small mb-0 opacity-75">当前系统版本: v1.0.0-release</p>
                </div>
            </div>

            <!-- 右侧主要内容 -->
            <div class="card-content">
                <div class="welcome-badge">
                    <i class="fas fa-check-circle me-2"></i> 认证受信任
                </div>
                <h1 class="display-6 fw-bold mb-3">您好，<span th:text="${username}" class="text-primary">Admin</span></h1>
                <p class="text-secondary lead mb-5">身份认证已成功。您可以继续管理您的数字资产或配置认证策略。</p>

                <div class="action-grid">
                    <!-- 管理员入口 -->
                    <a href="/admin/dashboard" sec:authorize="hasRole('ADMIN')" class="action-btn btn-admin shadow-sm">
                        <i class="fas fa-chart-pie"></i> 进入控制台管理后台
                    </a>
                    
                    <!-- 开发者文档 -->
                    <a href="/.well-known/openid-configuration" target="_blank" class="action-btn">
                        <i class="fas fa-book"></i>
                        <span>服务发现文档</span>
                    </a>

                    <!-- 开发者中心 -->
                    <a href="https://github.com/spring-projects/spring-authorization-server" target="_blank" class="action-btn">
                        <i class="fab fa-github"></i>
                        <span>开发者中心</span>
                    </a>
                </div>

                <div class="mt-5 pt-4 border-top d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge bg-success-subtle text-success p-2 rounded-circle">
                            <i class="fas fa-server"></i>
                        </span>
                        <span class="text-muted small fw-medium">节点状态: 运行良好</span>
                    </div>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-link logout-link p-0">
                            <i class="fas fa-sign-out-alt me-1"></i> 退出登录
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="text-center mt-4 text-muted small">
            &copy; 2026 统一身份认证中心 &middot; 安全、合规、可靠
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.staticfile.org/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
